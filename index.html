<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ഡെയിലി റിവിഷൻ - സൗണ്ട് ബുക്ക്</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #2c3e50; text-align: center; padding: 5px; margin: 0; color: white; }
        .page-box { background: white; border-radius: 8px; padding: 10px; max-width: 500px; margin: 15px auto; position: relative; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* റെസ്പോൺസീവ് ഇമേജ് റാപ്പർ */
        .img-wrap { position: relative; display: inline-block; width: 100%; background: #000; }
        .img-wrap img { display: block; width: 100%; height: auto; }
        
        /* അദൃശ്യമായ ടച്ച് ഏരിയ (Invisible Touch Area) */
        .word-zone { 
            position: absolute; 
            background: transparent; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* ലോക്ക് സ്റ്റൈൽ */
        .locked { filter: blur(5px) grayscale(100%); pointer-events: none; }
        .lock-text { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); color:white; display:flex; justify-content:center; align-items:center; font-size:16px; font-weight:bold; border-radius: 8px; padding: 10px; }
        
        h1 { font-size: 20px; margin: 10px 0; }
        h3 { margin: 5px 0; font-size: 15px; color: #2c3e50; }
        .badge { background: #e67e22; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; float: right; }
        .badge.completed { background: #2ecc71; }
    </style>
</head>
<body>

    <h1>📖 ഡെയിലി റിവിഷൻ ബുക്ക് 🔊</h1>
    <div id="bookContainer"></div>

    <script>
        // ലോക്കൽ സ്റ്റോറേജിൽ നിന്ന് പേജുകൾ എടുക്കുന്നു
        let bookPages = JSON.parse(localStorage.getItem('soundBookPages')) || [];

        function renderBook() {
            const container = document.getElementById('bookContainer');
            container.innerHTML = bookPages.length === 0 ? '<p style="color:white;">പാഠങ്ങൾ ഒന്നും ലഭ്യമാക്കിയിട്ടില്ല.</p>' : '';

            bookPages.forEach((page, index) => {
                // റിവിഷൻ ലോക്കിംഗ് ലോജിക്:
                // ആദ്യത്തെ പേജ് (ഏറ്റവും പുതിയത്) എപ്പോഴും അൺലോക്ക് ആയിരിക്കും (index === 0).
                // പിന്നീടുള്ള ഓരോ പേജും തുറക്കണമെങ്കിൽ തൊട്ടുമുകളിലുള്ള പേജ് (index - 1) പൂർത്തിയായിരിക്കണം.
                let isLocked = false;
                if (index > 0) {
                    let previousDayPage = bookPages[index - 1];
                    if (!previousDayPage.completed) {
                        isLocked = true;
                    }
                }

                let box = document.createElement('div');
                box.className = 'page-box';
                
                // പേജ് ഹെഡ്ഡിംഗ്
                let pageNum = bookPages.length - index;
                let statusBadge = page.completed ? '<span class="badge completed">✅ പഠിച്ചു കഴിഞ്ഞു</span>' : '<span class="badge">📖 ഇന്നത്തെ പാഠം</span>';
                if(index > 0) statusBadge = page.completed ? '<span class="badge completed">✅ റിവിഷൻ കഴിഞ്ഞു</span>' : '<span class="badge">⏳ കാത്തിരിക്കുന്നു</span>';
                
                box.innerHTML = `<h3>📚 പാഠം ഭാഗം - പേജ് ${pageNum} ${statusBadge}</h3>`;

                let content = document.createElement('div');
                if(isLocked) content.className = 'locked';

                let wrap = document.createElement('div');
                wrap.className = 'img-wrap';
                
                let img = document.createElement('img');
                img.src = page.image;
                wrap.appendChild(img);

                // വാക്കുകൾ സെറ്റ് ചെയ്യുന്നു
                page.zones.forEach((zone) => {
                    let zoneDiv = document.createElement('div');
                    zoneDiv.className = 'word-zone';
                    zoneDiv.style.left = zone.coords.left + '%';
                    zoneDiv.style.top = zone.coords.top + '%';
                    zoneDiv.style.width = zone.coords.width + '%';
                    zoneDiv.style.height = zone.coords.height + '%';

                    zoneDiv.onclick = function() {
                        new Audio(zone.audioSrc).play();
                        if(!zone.clicked) {
                            zone.clicked = true;
                            checkStatus(page.id);
                        }
                    };
                    wrap.appendChild(zoneDiv);
                });

                content.appendChild(wrap);
                box.appendChild(content);

                // ലോക്ക് സ്ക്രീൻ മെസ്സേജ്
                if(isLocked) {
                    let lock = document.createElement('div');
                    lock.className = 'lock-text';
                    lock.innerText = `🔒 മുകളിലെ പേജ് പൂർത്തിയാക്കിയാൽ മാത്രമേ ഈ മുൻദിവസത്തെ പേജ് അൺലോക്ക് ആകൂ!`;
                    box.appendChild(lock);
                }
                container.appendChild(box);
            });
        }

        function checkStatus(pageId) {
            let page = bookPages.find(p => p.id === pageId);
            if(page.zones.every(z => z.clicked)) {
                if (!page.completed) {
                    page.completed = true;
                    localStorage.setItem('soundBookPages', JSON.stringify(bookPages));
                    alert("🎉 ഈ പേജ് പൂർത്തിയായി! ഇതിന് മുമ്പത്തെ ദിവസത്തെ പാഠം താഴെ അൺലോക്ക് ആയിട്ടുണ്ട്.");
                    renderBook();
                }
            }
        }

        renderBook();
    </script>
</body>
</html>
