<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>ഡിജിറ്റൽ സൗണ്ട് ബുക്ക് - കുട്ടികളുടെ റിവിഷൻ</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .page-box { background: white; border: 3px solid #2c3e50; border-radius: 8px; padding: 20px; max-width: 550px; margin: 20px auto; position: relative; }
        .img-wrap { position: relative; display: inline-block; }
        .img-wrap img { display: block; max-width: 100%; height: auto; }
        .word-zone { position: absolute; background: rgba(52, 152, 219, 0.1); cursor: pointer; }
        .word-zone.done { background: rgba(46, 204, 113, 0.3); border: 2px solid #2ecc71; }
        .locked { filter: blur(4px) grayscale(100%); pointer-events: none; }
        .lock-text { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); color:white; display:flex; justify-content:center; align-items:center; font-size:20px; font-weight:bold; }
    </style>
</head>
<body>

    <h1>✍️ എന്റെ ചിത്രപുസ്തകം (റിവിഷൻ ഏരിയ) 🔊</h1>
    <div id="bookContainer"></div>

    <script>
        // ലോക്കൽ സ്റ്റോറേജിൽ നിന്ന് ടീച്ചർ അപ്‌ലോഡ് ചെയ്ത ഡാറ്റ എടുക്കുന്നു
        let bookPages = JSON.parse(localStorage.getItem('soundBookPages')) || [];

        function renderBook() {
            const container = document.getElementById('bookContainer');
            container.innerHTML = bookPages.length === 0 ? '<p>ടീച്ചർ പുതിയ പാഠങ്ങൾ ഒന്നും അപ്‌ലോഡ് ചെയ്തിട്ടില്ല.</p>' : '';

            bookPages.forEach((page, index) => {
                let isLocked = false;
                if (index < bookPages.length - 1 && !bookPages[index + 1].completed) isLocked = true;

                let box = document.createElement('div');
                box.className = 'page-box';
                box.innerHTML = `<h3>പാഠം പേജ് - ${bookPages.length - index}</h3>`;

                let content = document.createElement('div');
                if(isLocked) content.className = 'locked';

                let wrap = document.createElement('div');
                wrap.className = 'img-wrap';
                
                let img = document.createElement('img');
                img.src = page.image;
                wrap.appendChild(img);

                page.zones.forEach((zone, zIdx) => {
                    let zoneDiv = document.createElement('div');
                    zoneDiv.className = 'word-zone' + (zone.clicked ? ' done' : '');
                    zoneDiv.style.left = zone.coords.left + 'px';
                    zoneDiv.style.top = zone.coords.top + 'px';
                    zoneDiv.style.width = zone.coords.width + 'px';
                    zoneDiv.style.height = zone.coords.height + 'px';

                    zoneDiv.onclick = function() {
                        new Audio(zone.audioSrc).play();
                        if(!zone.clicked) {
                            zone.clicked = true;
                            zoneDiv.classList.add('done');
                            checkStatus(page.id);
                        }
                    };
                    wrap.appendChild(zoneDiv);
                });

                content.appendChild(wrap);
                box.appendChild(content);

                if(isLocked) {
                    let lock = document.createElement('div');
                    lock.className = 'lock-text';
                    lock.innerText = '🔒 താഴത്തെ പേജ് പൂർത്തിയാക്കൂ!';
                    box.appendChild(lock);
                }
                container.appendChild(box);
            });
        }

        function checkStatus(pageId) {
            let page = bookPages.find(p => p.id === pageId);
            if(page.zones.every(z => z.clicked)) {
                page.completed = true;
                localStorage.setItem('soundBookPages', JSON.stringify(bookPages));
                alert("🎉 ഈ പേജ് പൂർത്തിയായി! അടുത്ത പേജ് അൺലോക്ക് ആയി.");
                renderBook();
            }
        }

        renderBook();
    </script>
</body>
</html>
