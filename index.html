<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ഡിജിറ്റൽ സൗണ്ട് ബുക്ക് - റിവിഷൻ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #2c3e50; text-align: center; padding: 5px; margin: 0; color: white; }
        .page-box { background: white; border-radius: 8px; padding: 10px; max-width: 500px; margin: 10px auto; position: relative; color: #333; }
        
        /* ഫുൾ റെസ്പോൺസീവ് ഇമേജ് റാപ്പർ */
        .img-wrap { position: relative; display: inline-block; width: 100%; background: #000; }
        .img-wrap img { display: block; width: 100%; height: auto; }
        
        /* വാക്കുകളുടെ ടച്ച് ഏരിയ (ശതമാനക്കണക്കിൽ) */
        .word-zone { position: absolute; background: rgba(52, 152, 219, 0.1); cursor: pointer; border-radius: 4px; }
        .word-zone.done { background: rgba(46, 204, 113, 0.4); border: 2px solid #2ecc71; }
        
        .locked { filter: blur(5px) grayscale(100%); pointer-events: none; }
        .lock-text { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); color:white; display:flex; justify-content:center; align-items:center; font-size:18px; font-weight:bold; border-radius: 8px; }
        h1 { font-size: 20px; margin: 10px 0; }
        h3 { margin: 5px 0; font-size: 16px; }
    </style>
</head>
<body>

    <h1>📖 എന്റെ ചിത്രപുസ്തകം 🔊</h1>
    <div id="bookContainer"></div>

    <script>
        let bookPages = JSON.parse(localStorage.getItem('soundBookPages')) || [];

        function renderBook() {
            const container = document.getElementById('bookContainer');
            container.innerHTML = bookPages.length === 0 ? '<p style="color:white;">പാഠങ്ങൾ ഒന്നും ലഭ്യമാക്കിയിട്ടില്ല.</p>' : '';

            bookPages.forEach((page, index) => {
                let isLocked = false;
                if (index < bookPages.length - 1 && !bookPages[index + 1].completed) isLocked = true;

                let box = document.createElement('div');
                box.className = 'page-box';
                box.innerHTML = `<h3>📚 പാഠം ഭാഗം - പേജ് ${bookPages.length - index}</h3>`;

                let content = document.createElement('div');
                if(isLocked) content.className = 'locked';

                let wrap = document.createElement('div');
                wrap.className = 'img-wrap';
                
                let img = document.createElement('img');
                img.src = page.image;
                wrap.appendChild(img);

                // ശതമാനക്കണക്ക് വെച്ച് കൃത്യമായ സ്ഥാനത്ത് ബോക്സുകൾ വെക്കുന്നു
                page.zones.forEach((zone) => {
                    let zoneDiv = document.createElement('div');
                    zoneDiv.className = 'word-zone' + (zone.clicked ? ' done' : '');
                    zoneDiv.style.left = zone.coords.left + '%';
                    zoneDiv.style.top = zone.coords.top + '%';
                    zoneDiv.style.width = zone.coords.width + '%';
                    zoneDiv.style.height = zone.coords.height + '%';

                    zoneDiv.onclick = function() {
                        new Audio(zone.audioSrc).play();
                        if(!zone.clicked) {
                            zone.clicked = true;
                            zoneDiv.classList.add('done');
                            checkStatus(page.id);
                        }
                    };
                    wrap.appendChild(zoneDiv);
                });

                content.appendChild(wrap);
                box.appendChild(content);

                if(isLocked) {
                    let lock = document.createElement('div');
                    lock.className = 'lock-text';
                    lock.innerText = '🔒 താഴത്തെ പേജ് പൂർത്തിയാക്കൂ!';
                    box.appendChild(lock);
                }
                container.appendChild(box);
            });
        }

        function checkStatus(pageId) {
            let page = bookPages.find(p => p.id === pageId);
            if(page.zones.every(z => z.clicked)) {
                page.completed = true;
                localStorage.setItem('soundBookPages', JSON.stringify(bookPages));
                alert("🎉 ഈ പേജ് പൂർത്തിയായി! അടുത്ത പേജ് തുറന്നു.");
                renderBook();
            }
        }

        renderBook();
    </script>
</body>
</html>
