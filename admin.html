<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>സൗണ്ട് ബുക്ക് - അഡ്മിൻ പാനൽ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-radius: 4px; border: 1px solid #ccc; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; margin-top: 20px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; }
        .entry-item { background: #fff; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>സൗണ്ട് ബുക്ക് അഡ്മിൻ പാനൽ</h2>
    
    <form id="uploadForm">
        <label>മദ്രസയുടെ പേര്:</label>
        <input type="text" id="madrasaName" placeholder="മദ്രസയുടെ പേര് ടൈപ്പ് ചെയ്യുക" required>

        <label>കുട്ടിയുടെ പേര്:</label>
        <input type="text" id="studentName" placeholder="കുട്ടിയുടെ പേര് ടൈപ്പ് ചെയ്യുക" required>

        <label>പാഠപുസ്തകത്തിലെ ചിത്രം തിരഞ്ഞെടുക്കുക:</label>
        <input type="file" id="imageFile" accept="image/*" required>

        <label>കുട്ടിയുടെ ഓഡിയോ റെക്കോർഡിംഗ് തിരഞ്ഞെടുക്കുക:</label>
        <input type="file" id="audioFile" accept="audio/*" required>

        <button type="submit" id="submitBtn">പേജ് കുട്ടികൾക്കായി പോസ്റ്റ് ചെയ്യുക</button>
    </form>

    <hr style="margin-top: 30px;">
    <h3>നിലവിൽ പോസ്റ്റ് ചെയ്തവ:</h3>
    <div id="entriesList">വിവരങ്ങൾ ലോഡ് ചെയ്യുന്നു...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBXSgalqZ3h6Dle6pzu2VMXYkCKM4X3Pis",
        authDomain: "sond-book.firebaseapp.com",
        projectId: "sond-book",
        storageBucket: "sond-book.appspot.com",
        messagingSenderId: "731880152541",
        appId: "1:731880152541:web:da0e241383b850381dea34"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const uploadForm = document.getElementById('uploadForm');
    const entriesList = document.getElementById('entriesList');
    const submitBtn = document.getElementById('submitBtn');

    // ഫയൽ ബാക്ക്ഗ്രൗണ്ടിൽ ഫ്രീയായി അപ്‌ലോഡ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
    async function freeUpload(file) {
        const formData = new FormData();
        formData.append('fileToUpload', file);
        formData.append('reqtype', 'fileupload');
        
        const response = await fetch('https://catbox.moe/user/api.php', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) throw new Error('Upload failed');
        return await response.text();
    }

    // ഫോം സബ്മിറ്റ് ചെയ്യുമ്പോൾ
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const madrasaName = document.getElementById('madrasaName').value;
        const studentName = document.getElementById('studentName').value;
        const imageFile = document.getElementById('imageFile').files[0];
        const audioFile = document.getElementById('audioFile').files[0];

        submitBtn.disabled = true;
        submitBtn.innerText = "ഫയലുകൾ അപ്‌ലോഡ് ചെയ്യുന്നു... ദയവായി കാത്തിരിക്കൂ...";

        try {
            // ഫയലുകൾ ബാക്ക്ഗ്രൗണ്ടിൽ അപ്‌ലോഡ് ചെയ്ത് ലിങ്ക് എടുക്കുന്നു
            const imageUrl = await freeUpload(imageFile);
            const audioUrl = await freeUpload(audioFile);

            // ഫയർബേസ് ഡാറ്റാബേസിലേക്ക് സേവ് ചെയ്യുന്നു
            await db.collection("soundbooks").add({
                madrasaName: madrasaName,
                studentName: studentName,
                imageUrl: imageUrl,
                audioUrl: audioUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("വിജയകരമായി കുട്ടികൾക്കായി പോസ്റ്റ് ചെയ്തിരിക്കുന്നു!");
            uploadForm.reset();
            loadEntries();
        } catch (error) {
            console.error(error);
            alert("തകരാർ സംഭവിച്ചു: ഫയലുകൾ അപ്‌ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "പേജ് കുട്ടികൾക്കായി പോസ്റ്റ് ചെയ്യുക";
        }
    });

    // ലിസ്റ്റ് കാണിക്കാൻ
    function loadEntries() {
        db.collection("soundbooks").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            entriesList.innerHTML = "";
            if(snapshot.empty) {
                entriesList.innerHTML = '<p style="color:gray;">പോസ്റ്റുകൾ ഒന്നും ലഭ്യമല്ല.</p>';
                return;
            }
            snapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = "entry-item";
                item.innerHTML = `
                    <div>
                        <strong>${data.studentName}</strong> <br>
                        <small style="color:gray;">${data.madrasaName}</small>
                    </div>
                    <button onclick="deleteEntry('${doc.id}')" class="delete-btn">Delete</button>
                `;
                entriesList.appendChild(item);
            });
        });
    }

    // ഡിലീറ്റ് ചെയ്യാൻ
    async function deleteEntry(id) {
        if(confirm("ഇത് ഡിലീറ്റ് ചെയ്യണം എന്ന് ഉറപ്പാണോ?")) {
            try {
                await db.collection("soundbooks").doc(id).delete();
                alert("ഡിലീറ്റ് ചെയ്തിരിക്കുന്നു.");
            } catch (error) {
                alert("ഡിലീറ്റ് ചെയ്യാൻ സാധിച്ചില്ല: " + error.message);
            }
        }
    }

    loadEntries();
</script>
</body>
</html>
